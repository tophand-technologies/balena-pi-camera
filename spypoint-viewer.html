<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RanchView Image Gallery</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-browser-config.local.js"></script>
    <script src="./supabase-browser-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #b9b9b9;
        }

        .tophand-mode h1 {
            margin-bottom: 4px;
        }

        .tophand-mode .header p {
            color: #d6b56d;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        select, button {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        select {
            background: #333;
            color: #fff;
        }

        button {
            background: #4CAF50;
            color: white;
        }

        button:hover {
            background: #45a049;
        }

        .stats {
            text-align: center;
            margin-bottom: 20px;
            color: #888;
        }

        .intel-filter-panel {
            display: none;
            max-width: 1100px;
            margin: 0 auto 18px;
        }

        .tophand-mode .intel-filter-panel {
            display: block;
        }

        .intel-filter-heading {
            text-align: center;
            color: #a8a8a8;
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 9px;
        }

        .intel-filters {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .intel-filter {
            width: 82px;
            min-height: 72px;
            aspect-ratio: 1 / 0.88;
            display: grid;
            place-items: center;
            align-content: center;
            gap: 3px;
            padding: 8px 6px;
            border: 1px solid #454545;
            border-radius: 8px;
            background: #262626;
            color: #ededed;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
        }

        .intel-filter:hover {
            background: #303030;
            border-color: #6b6042;
            transform: translateY(-1px);
        }

        .intel-filter.active {
            background: rgba(214, 181, 109, 0.18);
            border-color: #d6b56d;
            color: #fff2cc;
        }

        .intel-filter:disabled {
            opacity: 0.38;
            cursor: default;
            transform: none;
        }

        .intel-filter-mark {
            display: grid;
            place-items: center;
            width: 28px;
            height: 24px;
            border-radius: 5px;
            background: rgba(214, 181, 109, 0.12);
            color: #d6b56d;
            font-size: 0.72rem;
            font-weight: 900;
            letter-spacing: 0.04em;
        }

        .intel-filter-label {
            font-size: 0.72rem;
            font-weight: 800;
            line-height: 1.1;
            text-align: center;
        }

        .intel-filter-count {
            color: #a8a8a8;
            font-size: 0.68rem;
            font-weight: 700;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .image-card {
            background: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .image-card:hover {
            transform: scale(1.02);
        }

        .image-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            cursor: pointer;
        }

        .tophand-mode .image-card img {
            background: #050505;
            object-fit: contain;
        }

        .image-info {
            padding: 15px;
        }

        .image-name {
            font-weight: bold;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .image-meta {
            font-size: 0.85rem;
            color: #888;
        }

        .tophand-mode .image-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tophand-card-title {
            font-size: 0.98rem;
            font-weight: 700;
            color: #f2f2f2;
            line-height: 1.25;
        }

        .tophand-card-time {
            color: #b9b9b9;
            font-size: 0.86rem;
            line-height: 1.35;
        }

        .vlm-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .vlm-tag {
            display: inline-flex;
            align-items: center;
            min-height: 24px;
            padding: 4px 8px;
            border: 1px solid rgba(214, 181, 109, 0.32);
            border-radius: 4px;
            background: rgba(214, 181, 109, 0.08);
            color: #e5d1a0;
            font-size: 0.72rem;
            font-weight: 650;
            line-height: 1.2;
        }

        .vlm-tag.intel-pill {
            cursor: pointer;
        }

        .vlm-tag.intel-pill.active {
            background: rgba(214, 181, 109, 0.2);
            border-color: #d6b56d;
            color: #fff2cc;
        }

        @media (max-width: 640px) {
            .intel-filter {
                width: 72px;
                min-height: 66px;
            }
        }

        .device-tag {
            display: inline-block;
            padding: 4px 8px;
            background: #4CAF50;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
        }

        .error {
            text-align: center;
            padding: 50px;
            color: #ff6b6b;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 id="galleryTitle">🐄 RanchView Image Gallery</h1>
        <p id="gallerySubtitle">All ranch cameras</p>
    </div>

    <div class="controls">
        <select id="deviceFilter">
            <option value="all">All Devices</option>
        </select>
        <select id="sortOrder">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
        </select>
        <button onclick="loadImages()">🔄 Refresh</button>
    </div>

    <div class="intel-filter-panel" id="intelFilterPanel">
        <div class="intel-filter-heading">Intelligence Filters</div>
        <div class="intel-filters" id="intelFilters" role="group" aria-label="Intelligence filters"></div>
    </div>

    <div class="stats" id="stats">Loading...</div>

    <div id="gallery" class="gallery"></div>

    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close">&times;</span>
        <img id="lightboxImg" src="" alt="">
    </div>

    <script>
        // Supabase configuration
        const { url: SUPABASE_URL, key: SUPABASE_KEY } = window.getTophandSupabaseConfig();
        const VIEW_MODES = {
            ranchview: {
                bucket: 'spypoint-images',
                title: '🐄 RanchView Image Gallery',
                subtitle: 'All ranch cameras',
                hiddenTable: 'images'
            },
            tophand: {
                bucket: 'tophand-branded-images',
                title: 'RanchView',
                subtitle: 'by TOPHAND',
                manifestPath: 'manifest.json',
                hiddenTable: null
            }
        };

        const pathName = window.location.pathname.replace(/\/$/, '');
        const viewMode = pathName === '/tophand' ? VIEW_MODES.tophand : VIEW_MODES.ranchview;
        const BUCKET = viewMode.bucket;

        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allImages = [];
        let devices = new Set();
        let activeIntelFilters = new Set();

        // Friendly camera names mapping
        const cameraNames = {
            'FLEX-M-MGE4': 'Pastucha Hay',
            'FLEX-M-NGEF': 'Back Yard',
            'FLEX-M-RJQM': 'Ainsworth Gate',
            'FLEX-S-DARK-RJQH': 'Cattle Pen',
            'QC': 'Pastucha Pond',
            'QN': 'Donna Trough 1',
            'YV': 'Donna Trough 2'
        };

        const sceneProfiles = {
            'FLEX-M-MGE4': { type: 'hay', label: 'Hay feeding area' },
            'QC': { type: 'water', label: 'Pond watch', filterId: 'water_pond', waterSource: 'pond' },
            'QN': { type: 'water', label: 'Trough watch', filterId: 'water_trough', waterSource: 'trough' },
            'YV': { type: 'water', label: 'Trough watch', filterId: 'water_trough', waterSource: 'trough' }
        };

        const intelligenceFilters = [
            { id: 'water_trough', label: 'Water Trough', mark: 'WT', title: 'Water trough' },
            { id: 'water_pond', label: 'Water Pond', mark: 'WP', title: 'Water pond' },
            { id: 'cattle', label: 'Cattle', mark: 'COW', title: 'Cattle' },
            { id: 'horse', label: 'Horse', mark: 'HOR', title: 'Horse' },
            { id: 'person', label: 'Person', mark: 'PER', title: 'Person' },
            { id: 'vehicle', label: 'Vehicle', mark: 'VEH', title: 'Vehicle' },
            { id: 'deer', label: 'Deer', mark: 'DEE', title: 'Deer' },
            { id: 'hog', label: 'Hog', mark: 'HOG', title: 'Hog' }
        ];

        const intelFilterById = Object.fromEntries(intelligenceFilters.map(filter => [filter.id, filter]));

        // Devices to exclude from viewer
        const excludedDevices = ['Untitled folder', 'test'];

        // Get friendly name or return original
        function getFriendlyName(deviceName) {
            return cameraNames[deviceName] || deviceName;
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function configureViewMode() {
            document.title = viewMode === VIEW_MODES.tophand ? 'RanchView by TOPHAND' : 'RanchView Image Gallery';
            document.getElementById('galleryTitle').textContent = viewMode.title;
            document.getElementById('gallerySubtitle').textContent = viewMode.subtitle;

            if (viewMode === VIEW_MODES.tophand) {
                document.body.classList.add('tophand-mode');
                renderIntelFilters();
            }
        }

        function parseDateFromFilename(filename) {
            // Parse date from Spypoint filename format: PICTXXXX_S_YYYYMMDDHHMM...
            // Example: PICT3818_S_202603081302zLK0k.jpg -> 2026-03-08 13:02
            // NOTE: Camera times are in LOCAL time (Central), not UTC
            const match = filename.match(/_S?_(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/);
            if (match) {
                const [, year, month, day, hour, minute] = match;
                // Parse as local time (no 'Z' suffix) so browser interprets it correctly
                return new Date(`${year}-${month}-${day}T${hour}:${minute}:00`);
            }

            // Fallback: try without _S suffix
            const match2 = filename.match(/(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})/);
            if (match2) {
                const [, year, month, day, hour, minute] = match2;
                return new Date(`${year}-${month}-${day}T${hour}:${minute}:00`);
            }

            return null;
        }

        async function loadImages() {
            const gallery = document.getElementById('gallery');
            const stats = document.getElementById('stats');

            gallery.innerHTML = '<div class="loading">Loading images...</div>';
            stats.textContent = 'Loading...';

            try {
                devices = new Set();

                // Get hidden images from database (if available)
                const hiddenImages = new Set();
                if (viewMode.hiddenTable) {
                    try {
                        const { data: dbImages, error: dbError } = await supabaseClient
                            .from(viewMode.hiddenTable)
                            .select('storage_path')
                            .eq('is_hidden', true);

                        if (!dbError && dbImages) {
                            dbImages.forEach(img => hiddenImages.add(img.storage_path));
                            console.log(`Found ${hiddenImages.size} hidden images in database`);
                        }
                    } catch (e) {
                        console.log('Could not load hidden images list (non-fatal):', e.message);
                    }
                }

                if (viewMode.manifestPath) {
                    const { data: manifestData } = supabaseClient.storage
                        .from(BUCKET)
                        .getPublicUrl(viewMode.manifestPath);

                    const manifestResponse = await fetch(`${manifestData.publicUrl}?t=${Date.now()}`, {
                        cache: 'no-store'
                    });

                    if (manifestResponse.status === 404) {
                        allImages = [];
                        updateDeviceFilter();
                        displayImages();
                        return;
                    }

                    if (!manifestResponse.ok) {
                        throw new Error(`Could not load branded image manifest (${manifestResponse.status})`);
                    }

                    const manifest = await manifestResponse.json();
                    allImages = (manifest.images || [])
                        .filter(image => image.path && !hiddenImages.has(image.path))
                        .map(image => {
                            const name = image.name || image.path.split('/').pop();
                            const device = image.device || image.path.split('/')[0];
                            const parsedDate = parseDateFromFilename(name);
                            const metadata = image.metadata || {};
                            const vlm = image.vlm || metadata.vlm || null;
                            const structuredVlm = vlm && (
                                vlm.animals_detected !== undefined ||
                                vlm.animal_count !== undefined ||
                                vlm.humans_detected !== undefined ||
                                vlm.vehicles_detected !== undefined ||
                                vlm.water_present !== undefined ||
                                vlm.gate_status !== undefined ||
                                vlm.alert_priority !== undefined
                            );

                            devices.add(device);
                            return {
                                name,
                                path: image.path,
                                captured_at: image.captured_at || (parsedDate ? parsedDate.toISOString() : null),
                                device,
                                camera_title: image.camera_title || getFriendlyName(device),
                                temperature_text: image.temperature_text || image.overlay_temperature_text || metadata.overlay_temperature_text || null,
                                analysis: image.analysis || image.vlm_analysis || metadata.analysis || metadata.vlm_analysis || (structuredVlm ? vlm : null)
                            };
                        })
                        .filter(image => image.captured_at);

                    updateDeviceFilter();
                    displayImages();
                    return;
                }

                // Get all files from storage
                const { data, error } = await supabaseClient.storage
                    .from(BUCKET)
                    .list('', {
                        limit: 1000,
                        sortBy: { column: 'created_at', order: 'desc' }
                    });

                if (error) throw error;

                // Get files from all subdirectories
                const allFiles = [];

                // Get top-level folders (device names)
                for (const item of data) {
                    if (item.id === null) { // It's a folder
                        const deviceName = item.name;

                        // Skip excluded devices
                        if (excludedDevices.includes(deviceName)) {
                            continue;
                        }

                        devices.add(deviceName);

                        // List all files recursively in this device folder
                        const files = await listAllFiles(deviceName, '', hiddenImages);
                        allFiles.push(...files);
                    }
                }

                allImages = allFiles;

                // Update device filter
                updateDeviceFilter();

                // Display images
                displayImages();

            } catch (error) {
                gallery.innerHTML = `<div class="error">Error loading images: ${error.message}</div>`;
                console.error('Error:', error);
            }
        }

        async function listAllFiles(prefix, path = '', hiddenImages = new Set()) {
            const fullPath = path ? `${prefix}/${path}` : prefix;
            const files = [];

            const { data, error } = await supabaseClient.storage
                .from(BUCKET)
                .list(fullPath, {
                    limit: 1000,
                    sortBy: { column: 'created_at', order: 'desc' }
                });

            if (error) {
                console.error('Error listing files:', error);
                return files;
            }

            for (const item of data) {
                if (item.id === null) {
                    // It's a folder - skip thumbnail and hd folders
                    const folderName = item.name.toLowerCase();
                    if (!folderName.includes('thumb') && folderName !== 'hd') {
                        const subPath = path ? `${path}/${item.name}` : item.name;
                        const subFiles = await listAllFiles(prefix, subPath, hiddenImages);
                        files.push(...subFiles);
                    }
                } else {
                    // It's a file - skip thumbnails (by name or path)
                    const filePath = path ? `${prefix}/${path}/${item.name}` : `${prefix}/${item.name}`;
                    const isThumbnail = item.name.includes('_thumb') ||
                                       item.name.includes('thumb.') ||
                                       filePath.includes('/thumbnails/') ||
                                       filePath.includes('/thumb/');

                    // Skip if image is marked as hidden in database
                    const isHidden = hiddenImages.has(filePath);

                    if (!isThumbnail && !isHidden) {
                        // Parse capture date from filename, fallback to storage created_at
                        const parsedDate = parseDateFromFilename(item.name);
                        const capturedAt = parsedDate ? parsedDate.toISOString() : item.created_at;

                        files.push({
                            name: item.name,
                            path: filePath,
                            captured_at: capturedAt,
                            device: prefix
                        });
                    }
                }
            }

            return files;
        }

        function formatCaptureDateTime(capturedAt) {
            const date = new Date(capturedAt);
            if (Number.isNaN(date.getTime())) {
                return 'Capture time unavailable';
            }

            return date.toLocaleString([], {
                month: 'short',
                day: 'numeric',
                year: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function normalizeSpecies(value) {
            if (!value) return '';
            if (Array.isArray(value)) return value.filter(Boolean).join(', ');
            if (typeof value === 'object') {
                return Object.keys(value)
                    .filter(key => value[key])
                    .join(', ');
            }
            return String(value);
        }

        function titleCase(value) {
            return String(value || '')
                .replace(/[_-]+/g, ' ')
                .replace(/\w\S*/g, word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase());
        }

        function compactPercent(value) {
            if (value === null || value === undefined || value === '') return '';
            const number = Number(value);
            if (Number.isNaN(number)) return String(value);
            return `${Math.round(number)}%`;
        }

        function compactNumber(value) {
            if (value === null || value === undefined || value === '') return '';
            const number = Number(value);
            if (Number.isNaN(number)) return String(value);
            const rounded = Math.round(number * 10) / 10;
            return String(Number.isInteger(rounded) ? Math.round(rounded) : rounded);
        }

        function hasKnownValue(value) {
            if (value === null || value === undefined || value === '') return false;
            return !['unknown', 'none', 'null', 'false'].includes(String(value).toLowerCase());
        }

        function hasPositiveCount(value) {
            const number = Number(value);
            return !Number.isNaN(number) && number > 0;
        }

        function termIsNegated(text, start, end) {
            const before = text.slice(Math.max(0, start - 56), start);
            const after = text.slice(end, end + 32);
            return /\b(no|not|none|without|absent|missing)\b[\w\s,;/&-]{0,56}$/.test(before) ||
                /^\s*(?::|=|-)?\s*(no|none|0|absent|missing|not visible|not present)\b/.test(after);
        }

        function containsAny(text, terms) {
            return terms.some(term => {
                const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace(/\s+/g, '\\s+');
                const pattern = new RegExp(`(^|[^a-z0-9])(${escaped})(?=$|[^a-z0-9])`, 'gi');
                let match;
                while ((match = pattern.exec(text)) !== null) {
                    const start = match.index + match[1].length;
                    const end = start + match[2].length;
                    if (!termIsNegated(text, start, end)) return true;
                }
                return false;
            });
        }

        function analysisSearchText(analysis) {
            return [
                analysis.summary,
                analysis.short_summary,
                analysis.scene,
                normalizeSpecies(analysis.animal_species || analysis.species),
                normalizeSpecies(analysis.vehicle_types),
                normalizeSpecies(analysis.alert_concerns),
                normalizeSpecies(analysis.infrastructure),
                normalizeSpecies(analysis.stable_scene_attributes),
                analysis.water_source_type,
                analysis.water_quality
            ].filter(Boolean).join(' ').toLowerCase();
        }

        function deriveImageIntelIds(image) {
            const analysis = image.analysis || {};
            const sceneProfile = sceneProfiles[image.device] || null;
            const ids = [];
            const add = id => {
                if (id && intelFilterById[id] && !ids.includes(id)) ids.push(id);
            };

            (analysis.filter_tags || []).forEach(add);

            if (sceneProfile?.filterId) {
                add(sceneProfile.filterId);
            }

            const text = analysisSearchText(analysis);
            const waterSource = String(analysis.water_source_type || sceneProfile?.waterSource || '').toLowerCase();
            if (waterSource === 'trough' || waterSource === 'tank') add('water_trough');
            if (waterSource === 'pond' || waterSource === 'creek' || waterSource === 'wetland') add('water_pond');

            if (
                analysis.humans_detected ||
                hasPositiveCount(analysis.human_count) ||
                containsAny(text, ['person', 'people', 'human', 'worker', 'ranch hand'])
            ) {
                add('person');
            }

            if (
                analysis.vehicles_detected ||
                hasPositiveCount(analysis.vehicle_count) ||
                normalizeSpecies(analysis.vehicle_types) ||
                containsAny(text, ['vehicle', 'truck', 'tractor', 'utv', 'atv', 'trailer', 'car'])
            ) {
                add('vehicle');
            }

            if (containsAny(text, ['cattle', 'cow', 'cows', 'calf', 'calves', 'bull', 'bulls', 'longhorn', 'steer'])) {
                add('cattle');
            }

            if (containsAny(text, ['horse', 'horses', 'mare', 'foal'])) {
                add('horse');
            }

            if (containsAny(text, ['deer', 'doe', 'buck', 'fawn'])) {
                add('deer');
            }

            if (containsAny(text, ['hog', 'hogs', 'pig', 'pigs', 'boar', 'feral swine'])) {
                add('hog');
            }

            return ids;
        }

        function getImageIntelIds(image) {
            if (!image._intelIds) {
                image._intelIds = deriveImageIntelIds(image);
            }
            return image._intelIds;
        }

        function imageMatchesIntelFilter(image, filterId) {
            return getImageIntelIds(image).includes(filterId);
        }

        function toggleIntelFilter(filterId) {
            if (!intelFilterById[filterId]) return;
            if (activeIntelFilters.has(filterId)) {
                activeIntelFilters.delete(filterId);
            } else {
                activeIntelFilters.add(filterId);
            }
            displayImages();
        }

        function renderIntelFilters() {
            const container = document.getElementById('intelFilters');
            if (!container || viewMode !== VIEW_MODES.tophand) return;
            container.innerHTML = intelligenceFilters.map(filter => `
                <button
                    class="intel-filter"
                    type="button"
                    data-filter-id="${escapeHtml(filter.id)}"
                    aria-pressed="false"
                    title="${escapeHtml(filter.title)}"
                >
                    <span class="intel-filter-mark">${escapeHtml(filter.mark)}</span>
                    <span class="intel-filter-label">${escapeHtml(filter.label)}</span>
                    <span class="intel-filter-count">0</span>
                </button>
            `).join('');
            container.querySelectorAll('.intel-filter').forEach(button => {
                button.addEventListener('click', () => toggleIntelFilter(button.dataset.filterId));
            });
        }

        function updateIntelFilterState(baseImages) {
            if (viewMode !== VIEW_MODES.tophand) return;
            const container = document.getElementById('intelFilters');
            if (!container || !container.children.length) renderIntelFilters();

            intelligenceFilters.forEach(filter => {
                const button = document.querySelector(`.intel-filter[data-filter-id="${filter.id}"]`);
                if (!button) return;
                const count = baseImages.filter(image => imageMatchesIntelFilter(image, filter.id)).length;
                const active = activeIntelFilters.has(filter.id);
                button.classList.toggle('active', active);
                button.disabled = count === 0 && !active;
                button.setAttribute('aria-pressed', active ? 'true' : 'false');
                const countNode = button.querySelector('.intel-filter-count');
                if (countNode) countNode.textContent = String(count);
            });
        }

        function buildVlmTags(image) {
            const analysis = image.analysis || {};
            const tags = [];
            const sceneProfile = sceneProfiles[image.device] || null;

            if (image.temperature_text) {
                tags.push(image.temperature_text);
            }

            const hay = analysis.hay || analysis.hay_intelligence || null;
            if (hay) {
                if (hay.no_bales_confirmed) tags.push('No bales');
                else if (hay.round_bales_visible !== undefined && hay.round_bales_visible !== null) tags.push(`${hay.round_bales_visible} bales`);
                if (hay.bale_equivalents_remaining !== undefined && hay.bale_equivalents_remaining !== null) {
                    tags.push(`${compactNumber(hay.bale_equivalents_remaining)} bale eq`);
                }
            } else if (sceneProfile?.type === 'hay' && analysis.hay_bales_present) {
                tags.push('Hay visible');
            } else if (sceneProfile?.type === 'hay') {
                tags.push(sceneProfile.label);
            }

            if (sceneProfile?.type === 'water' && !analysis.water_present && !hasKnownValue(analysis.water_level)) {
                tags.push(sceneProfile.label);
            }

            const animalSpecies = normalizeSpecies(analysis.animal_species || analysis.species);
            if (analysis.animals_detected || analysis.animal_count || animalSpecies) {
                const count = analysis.animal_count ? `${analysis.animal_count} ` : '';
                tags.push(`${count}${animalSpecies || 'animals'}`.trim());
            }

            if (analysis.humans_detected || analysis.human_count) {
                tags.push(analysis.human_count ? `${analysis.human_count} people` : 'People');
            }

            const vehicleTypes = normalizeSpecies(analysis.vehicle_types);
            if (analysis.vehicles_detected || analysis.vehicle_count || vehicleTypes) {
                tags.push(vehicleTypes || (analysis.vehicle_count ? `${analysis.vehicle_count} vehicles` : 'Vehicles'));
            }

            const hasWaterLevel = hasKnownValue(analysis.water_level);
            if (analysis.water_present || hasWaterLevel || (analysis.water_level_percentage !== undefined && analysis.water_level_percentage !== null)) {
                const waterLevel = compactPercent(analysis.water_level_percentage) || titleCase(analysis.water_level);
                tags.push(hasKnownValue(waterLevel) ? `Water ${waterLevel}` : 'Water');
            }

            if (hasKnownValue(analysis.water_quality)) {
                tags.push(`Water ${titleCase(analysis.water_quality)}`);
            }

            if (hasKnownValue(analysis.water_source_type) && sceneProfile?.type === 'water') {
                tags.push(titleCase(analysis.water_source_type));
            }

            if (hasKnownValue(analysis.gate_status)) {
                tags.push(`Gate ${titleCase(analysis.gate_status)}`);
            }

            if (analysis.summary || analysis.short_summary) {
                tags.push(String(analysis.summary || analysis.short_summary));
            }

            if (analysis.alert_priority && !['none', 'normal', 'low'].includes(String(analysis.alert_priority).toLowerCase())) {
                tags.push(`Alert ${titleCase(analysis.alert_priority)}`);
            }

            if (analysis.confidence_score !== undefined && analysis.confidence_score !== null) {
                const confidence = Number(analysis.confidence_score);
                if (!Number.isNaN(confidence) && confidence < 0.9) {
                    tags.push(`${Math.round(confidence * (confidence <= 1 ? 100 : 1))}% confidence`);
                }
            }

            return tags
                .filter(Boolean)
                .map(tag => String(tag).trim())
                .filter((tag, index, list) => tag && list.indexOf(tag) === index)
                .slice(0, 4);
        }

        function renderVlmTags(image) {
            const intelPills = getImageIntelIds(image)
                .map(id => intelFilterById[id])
                .filter(Boolean);
            const intelLabels = new Set(intelPills.map(filter => filter.label.toLowerCase()));
            const detailTags = buildVlmTags(image)
                .filter(tag => !intelLabels.has(String(tag).toLowerCase()))
                .slice(0, Math.max(0, 5 - intelPills.length));
            if (!intelPills.length && !detailTags.length) return '';
            return `
                <div class="vlm-tags">
                    ${intelPills.map(filter => `
                        <span
                            class="vlm-tag intel-pill ${activeIntelFilters.has(filter.id) ? 'active' : ''}"
                            role="button"
                            tabindex="0"
                            data-filter-id="${escapeHtml(filter.id)}"
                            title="Filter ${escapeHtml(filter.title)}"
                        >${escapeHtml(filter.label)}</span>
                    `).join('')}
                    ${detailTags.map(tag => `<span class="vlm-tag">${escapeHtml(tag)}</span>`).join('')}
                </div>
            `;
        }

        function updateDeviceFilter() {
            const filter = document.getElementById('deviceFilter');
            const currentValue = filter.value;

            filter.innerHTML = '<option value="all">All Devices</option>';

            Array.from(devices).sort().forEach(device => {
                const option = document.createElement('option');
                option.value = device;
                option.textContent = getFriendlyName(device);
                filter.appendChild(option);
            });

            filter.value = currentValue;
        }

        function displayImages() {
            const gallery = document.getElementById('gallery');
            const stats = document.getElementById('stats');
            const deviceFilter = document.getElementById('deviceFilter').value;
            const sortOrder = document.getElementById('sortOrder').value;
            const activeFilters = Array.from(activeIntelFilters);

            // Filter images
            const deviceFiltered = allImages.filter(img =>
                deviceFilter === 'all' || img.device === deviceFilter
            );
            updateIntelFilterState(deviceFiltered);

            let filtered = deviceFiltered.filter(img =>
                !activeFilters.length || activeFilters.some(filterId => imageMatchesIntelFilter(img, filterId))
            );

            // Sort images by actual capture time (not upload time)
            filtered.sort((a, b) => {
                const timeA = new Date(a.captured_at).getTime();
                const timeB = new Date(b.captured_at).getTime();
                return sortOrder === 'newest' ? timeB - timeA : timeA - timeB;
            });

            // Update stats
            const activeLabels = activeFilters.map(filterId => intelFilterById[filterId]?.label).filter(Boolean);
            stats.textContent = activeLabels.length
                ? `${filtered.length} of ${deviceFiltered.length} images · ${activeLabels.join(', ')}`
                : `${filtered.length} images from ${devices.size} devices`;

            // Clear gallery
            gallery.innerHTML = '';

            // Display images
            filtered.forEach(image => {
                const card = createImageCard(image);
                gallery.appendChild(card);
            });

            if (filtered.length === 0) {
                gallery.innerHTML = '<div class="loading">No images found</div>';
            }
        }

        function createImageCard(image) {
            const card = document.createElement('div');
            card.className = 'image-card';

            // Get public URL
            const { data } = supabaseClient.storage
                .from(BUCKET)
                .getPublicUrl(image.path);

            const formattedDate = formatCaptureDateTime(image.captured_at);

            if (viewMode === VIEW_MODES.tophand) {
                const cameraTitle = image.camera_title || getFriendlyName(image.device);
                card.innerHTML = `
                    <img src="${data.publicUrl}" alt="${escapeHtml(cameraTitle)} ${escapeHtml(formattedDate)}" onclick="openLightbox('${data.publicUrl}')">
                    <div class="image-info">
                        <div class="tophand-card-title">${escapeHtml(cameraTitle)}</div>
                        <div class="tophand-card-time">${escapeHtml(formattedDate)}</div>
                        ${renderVlmTags(image)}
                    </div>
                `;

                return card;
            }

            card.innerHTML = `
                <img src="${data.publicUrl}" alt="${escapeHtml(image.name)}" onclick="openLightbox('${data.publicUrl}')">
                <div class="image-info">
                    <div class="image-name">${escapeHtml(image.name)}</div>
                    <div class="image-meta">${escapeHtml(formattedDate)}</div>
                    <span class="device-tag">${escapeHtml(getFriendlyName(image.device))}</span>
                </div>
            `;

            return card;
        }

        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Event listeners
        document.getElementById('deviceFilter').addEventListener('change', displayImages);
        document.getElementById('sortOrder').addEventListener('change', displayImages);
        document.addEventListener('click', event => {
            const target = event.target instanceof Element ? event.target : null;
            const pill = target?.closest('.intel-pill[data-filter-id]');
            if (!pill) return;
            toggleIntelFilter(pill.dataset.filterId);
        });
        document.addEventListener('keydown', event => {
            const target = event.target instanceof Element ? event.target : null;
            const pill = target?.closest('.intel-pill[data-filter-id]');
            if (!pill || !['Enter', ' '].includes(event.key)) return;
            event.preventDefault();
            toggleIntelFilter(pill.dataset.filterId);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        // Load images on page load
        configureViewMode();
        loadImages();
    </script>
</body>
</html>
